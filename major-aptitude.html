const LIKERT = ['전혀 아니다','아니다','그렇다','매우 그렇다'];

// ---------- state ----------

function renderDiag(){
 const el = document.getElementById('pageDiag');
 const totalSteps = ITEM_PAGES + 2;
 if(step===0){
  el.innerHTML = `<div class="startbox">
   <div class="big">🎯</div>

   <button class="btn" onclick="step=1;renderDiag()">진단 시작하기</button>
  </div>`;
  return;
 }
 if(step===99){ renderResult(); return; }
 const pct = Math.round((step-1)/totalSteps*100);
 let inner = `<div class="prog"><div style="width:${Math.max(pct,4)}%"></div></div>`;
 if(step===1){
  inner += `<div class="card"><span class="qnum">STEP 1</span>

 } else if(step>=2 && step<2+ITEM_PAGES){
  const pg = step-2;
  const items = ITEMS.map((it,i)=>({it,i})).slice(pg*PAGE_SIZE,(pg+1)*PAGE_SIZE);
  const done = items.every(x=>answers[x.i]>=0);
  inner += `<div class="card"><span class="qnum">STEP 2 · ${pg+1} / ${ITEM_PAGES} 페이지</span>
   <h2 class="q">나에게 얼마나 해당하는지 골라주세요</h2>

     <div class="scale">${LIKERT.map((lb,v)=>`<button class="sc ${answers[x.i]===v?'sel':''}" onclick="rate(${x.i},${v})">${lb}</button>`).join('')}</div>
    </div>`).join('')}
   </div>
   <button class="btn" ${done?'':'disabled'} onclick="step++;renderDiag()">다음</button>
   <button class="btn ghost" onclick="step--;renderDiag()">이전</button>`;
 } else if(step===2+ITEM_PAGES){
  inner += `<div class="card"><span class="qnum">마지막 STEP</span>
   <h2 class="q">그래도 끌리는 분야를 직접 골라본다면?</h2>

   <div class="chips">${Object.keys(CATS).map(c=>`<div class="chip ${pickedCats.includes(c)?'sel':''}" onclick="togCat('${c}')">${CATS[c].e} ${CATS[c].l}</div>`).join('')}</div></div>

function togSub(s){

 else if(pickedSubs.length<3) pickedSubs.push(s);
 renderDiag();
}
function togCat(c){
 if(pickedCats.includes(c)) pickedCats=pickedCats.filter(x=>x!==c);
 else if(pickedCats.length<3) pickedCats.push(c);
 renderDiag();
}
// ---------- scoring (2축: 흥미 i 0~6 / 강점 s 0~3) ----------
function domScores(){
 const dom = {};
 Object.keys(CATS).forEach(c=>dom[c]={i:0,s:0});
 ITEMS.forEach((it,idx)=>{
  if(answers[idx]>0){ if(it.a==='s') dom[it.c].s+=answers[idx]; else dom[it.c].i+=answers[idx]; }
 });
 return dom; // i: 흥미 0~6(2문항), s: 강점 0~3(1문항)
}
function domAvg(d, dom){
 const cats = d.cats||[];
 if(!cats.length) return {I:0,S:0};
 const I = cats.reduce((a,c)=>a+(dom[c]?dom[c].i:0),0)/cats.length; // 0~6
 const S = cats.reduce((a,c)=>a+(dom[c]?dom[c].s:0),0)/cats.length; // 0~3
 return {I,S};
}
function computeScores(){
 const dom = domScores();
 return DEPTS.map(d=>{
  const {I,S} = domAvg(d,dom);
  let s = (I + S*2) * 1.5;                                  // 흥미 + 강점(0~6 환산) 코어
  d.subs.forEach(sub=>{ if(pickedSubs.includes(sub)) s+=3; }); // 선호과목 일치
  if((d.cats||[]).some(c=>pickedCats.includes(c))) s+=4;       // 직접 선택 분야
  return {d, s};
 }).sort((a,b)=>b.s-a.s);
}
// ---------- 밴드(신뢰 라벨) ----------
// 흥미(좋아함, 0~6)와 강점(잘함, 0~3) 두 독립 신호로 절대 기준 밴드 산출.
function deptBand(d, dom){
 const cats = d.cats||[];
 const {I,S} = domAvg(d,dom);
 const strongI = I>=4, strongS = S>=2;           // 흥미 4/6↑, 강점 2/3↑
 const matchedSubs = (d.subs||[]).filter(s=>pickedSubs.includes(s));
 const pickedHit = cats.some(c=>pickedCats.includes(c));
 let level;
 if(strongI && strongS) level=3;        // 흥미·강점 둘 다 높음 → 강하게 맞음
 else if(strongI || strongS) level=2;   // 한 축만 높음 → 잘 맞음
 else level=1;                          // 둘 다 낮음 → 탐색 추천
 const meta={3:{label:'강하게 맞음',cls:'band3',bar:'barfill3'},2:{label:'잘 맞음',cls:'band2',bar:'barfill2'},1:{label:'탐색 추천',cls:'band1',bar:'barfill1'}}[level];
 const fill = Math.round(((I/6)+(S/3))/2*100); // 흥미·강점 평균 강도
 return {level,label:meta.label,cls:meta.cls,bar:meta.bar,I,S,fill,matchedSubs,pickedHit,cats};
}
function evidHTML(d, band, dom){
 const catRows = band.cats.map(c=>{
  const i=dom[c]?dom[c].i:0, s=dom[c]?dom[c].s:0;
  return `<div class="evrow"><span class="evlab">${CATS[c].e} ${CATS[c].l} <span class="evtag">흥미</span></span><div class="evbar"><div style="width:${Math.round(i/6*100)}%"></div></div><span class="evnum">${i}/6</span></div>
   <div class="evrow"><span class="evlab">${CATS[c].e} ${CATS[c].l} <span class="evtag str">강점</span></span><div class="evbar"><div class="evbar-s" style="width:${Math.round(s/3*100)}%"></div></div><span class="evnum">${s}/3</span></div>`;
 }).join('');
 const subChips = (d.subs||[]).map(s=>{
  const on=pickedSubs.includes(s);
  return `<span class="evchip ${on?'on':''}">${s}${on?' ✓':''}</span>`;
 }).join('');
 const pk = band.pickedHit
  ? `<b>직접 선택</b> · 이 분야를 관심분야로 직접 골랐어요`
  : `<span class="muted">직접 선택 · 해당 없음</span>`;
 return `<div class="evid">
   <div class="evttl">흥미 · 강점 응답 <span>· 둘 다 높을수록 강하게 맞음</span></div>
   ${catRows}
   <div class="evttl" style="margin-top:11px">선호과목 일치 <span>· 권장 ${(d.subs||[]).length}과목 중 ${band.matchedSubs.length}개</span></div>
   <div class="evchips">${subChips}</div>
   <div class="evpick">${pk}</div>
 </div>`;
}

  <div class="hint" style="margin-bottom:10px">학과를 누르면 전공 정보를, <b>'왜?'</b>를 누르면 이 결과가 나온 근거(흥미·강점 막대)를 볼 수 있어요</div>
  ${top.map((r,i)=>{

     <div class="rank ${i<3?'top':''}">${i<3?['🥇','🥈','🥉'][i]:(i+1)}</div>

    </div>
    ${evidHTML(r.d, band, dom)}</div>`;
  }).join('')}
  <div class="note"><b>밴드는 어떻게 정해지나요?</b> '좋아함(흥미)'과 '잘함(강점)' 두 가지를 따로 묻고, <b>둘 다 높으면 강하게 맞음</b>, 하나만 높으면 잘 맞음이에요. 각 학과의 <b>'왜?'</b>에서 두 막대를 직접 확인할 수 있어요.<br><br><b>📌 이 진단이 아직 보지 못하는 것</b> — 흥미·강점 신호만 봅니다. 내신·실제 개설과목은 반영하지 않으니 <b>내신진단·과목설계</b>와 함께 보면 더 정확해져요. 밴드가 낮아도 직접 탐색하면 새로운 발견이 있을 수 있어요!</div>

 window.scrollTo(0,0);

   <span class="badge ${TCLS[d.track]}" style="margin-left:0;margin-top:4px">${d.track} 계열</span></div>
   <button class="x" onclick="closeDetail()">✕</button></div>
  <div class="sec"><h4>📖 전공 소개</h4><p>${d.intro}</p></div>
  <div class="sec"><h4>💼 졸업 후 진로</h4><p>${d.career}</p></div>
  <div class="sec"><h4>✏️ 학생부종합전형 대비 과목 선택</h4>
   ${d.advice?`<p style="margin-bottom:10px">${d.advice}</p>`:''}
   <table class="subtable">
   ${rel?`<tr><td>관련 교과</td><td>${rel[1]}</td></tr>`:''}
   ${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}
   </table></div>
  ${d.univ?`<div class="sec"><h4>🏫 개설 대학</h4><p>${d.univ}</p></div>`:''}
  <div class="note">· 과목명은 2015 개정 교육과정 기준으로, 현재 적용 중인 2022 개정 교육과정과는 과목 이름이 다를 수 있어요.<br>· 자료 출처: 「2023 보인다 9.0 전공·적성 개발 길라잡이」(세종교육). 최신 정보는 각 대학 홈페이지와 커리어넷·어디가에서 확인하세요.</div>`;
 document.getElementById('ovl').classList.add('on');
 document.getElementById('sheet').scrollTop = 0;
 document.body.style.overflow='hidden';
}
function closeDetail(){
 document.getElementById('ovl').classList.remove('on');
 document.body.style.overflow='';
}

renderDiag();
renderTrackChips();
renderList();
</script>
</body>
</html>
