<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>에바연 학생부 설계실 6개월 이용권</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1080px}
  body{font-family:Pretendard,"Noto Sans KR",system-ui,sans-serif}
  .card{width:1080px;height:1080px;background:#fbf8f1;display:flex;flex-direction:column;
    overflow:hidden;letter-spacing:-.02em}
  .band{background:#11203f;padding:74px 74px 62px}
  .badges{display:flex;gap:14px;margin-bottom:52px}
  .b-fill{background:#e8714e;color:#fff;font-weight:800;font-size:31px;padding:14px 30px;border-radius:16px}
  .b-line{border:2px solid rgba(255,255,255,.38);color:#cdd8ec;font-weight:800;font-size:31px;padding:12px 28px;border-radius:16px}
  .band h1{color:#fff;font-weight:900;font-size:72px;line-height:1.3;letter-spacing:-.04em}
  .body{flex:1;padding:60px 74px 72px;display:flex;flex-direction:column}
  .desc{color:#6b7280;font-weight:500;font-size:33px;line-height:1.62;margin-bottom:46px}
  .chips{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:auto}
  .chips span{background:#dde5f1;color:#11203f;font-weight:800;font-size:31px;padding:16px 28px;border-radius:14px}
  .footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:50px}
  .note{color:#11203f;font-weight:800;font-size:31px}
  .price{color:#11203f;font-weight:900;font-size:74px;letter-spacing:-.03em}
</style>
</head>
<body>
  <div class="card">
    <div class="band">
      <div class="badges">
        <span class="b-fill">학생부 설계실</span>
        <span class="b-line">올인원</span>
        <span class="b-line">6개월</span>
      </div>
      <h1>진단부터 학생부까지,<br>6개월 한 흐름으로</h1>
    </div>
    <div class="body">
      <p class="desc">전공적성·생기부 진단으로 시작해 탐구자료·도서, 탐구 설계,<br>주간 플래너까지 — 희망학과를 축으로 이어집니다.</p>
      <div class="chips">
        <span>✓ 자기 진단</span>
        <span>✓ 3,500여 종 라이브러리</span>
        <span>✓ 탐구 설계</span>
        <span>✓ 주간 플래너</span>
      </div>
      <div class="footer">
        <span class="note">6개월 이용권 · 자동결제 없음</span>
        <span class="price">289,000원</span>
      </div>
    </div>
  </div>
</body>
</html>
